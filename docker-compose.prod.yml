version: '3.9'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: optifleet_app_prod
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://optifleet:${POSTGRES_PASSWORD}@db:5432/optifleet?serverVersion=16&charset=utf8
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      MAILER_DSN: ${MAILER_DSN}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - optifleet_network

  db:
    image: postgres:16-alpine
    container_name: optifleet_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: optifleet
      POSTGRES_USER: optifleet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optifleet -d optifleet"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - optifleet_network

  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: optifleet_front_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: ${API_URL}
    depends_on:
      - app
    networks:
      - optifleet_network

volumes:
  pgdata_prod:
    driver: local

networks:
  optifleet_network:
    driver: bridge
