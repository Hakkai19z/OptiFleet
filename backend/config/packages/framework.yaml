framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: true
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

    rate_limiter:
        login_limiter:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
            lock_factory: lock.factory

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
