name: CI OptiFleet

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (PHP 8.3 / Symfony 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: optifleet_test
          POSTGRES_USER: optifleet
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, intl, mbstring, zip
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem 4096
          openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem
        env:
          JWT_PASSPHRASE: test_passphrase

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-text --coverage-min=80
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://optifleet:secret@127.0.0.1:5432/optifleet_test
          JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
          JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
          JWT_PASSPHRASE: test_passphrase

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / React 18)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Vitest tests with coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
